#Tue Apr 14 20:52:46 ICT 2026
micronaut.application.name=cart

micronaut.router.static-resources.swagger.paths=classpath:META-INF/swagger
micronaut.router.static-resources.swagger.mapping=/swagger/**
micronaut.router.static-resources.swagger-ui.paths=classpath:META-INF/swagger/views/swagger-ui
micronaut.router.static-resources.swagger-ui.mapping=/swagger-ui/**

# MySQL datasource (override with DB_URL, DB_USER, DB_PASSWORD in environment)
datasources.default.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cart_service}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true&rewriteBatchedStatements=true
datasources.default.username=${DB_USER:root}
datasources.default.password=${DB_PASSWORD:Quocnhan123@}
datasources.default.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari pool tuning
datasources.default.maximum-pool-size=${DB_POOL_MAX:10}
datasources.default.minimum-idle=${DB_POOL_MIN:2}
datasources.default.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
datasources.default.idle-timeout=${DB_IDLE_TIMEOUT_MS:600000}
datasources.default.max-lifetime=${DB_MAX_LIFETIME_MS:1800000}

micronaut.security.enabled=true
micronaut.security.authentication=bearer
micronaut.security.basic-auth.enabled=false
micronaut.security.token.jwt.enabled=true
micronaut.security.token.jwt.signatures.secret.generator.secret=${JWT_SECRET:a3f1c2e48b7d4f11c2aa123456789abc5d3e2f16b7c4d8e9f00abcdef123456}


micronaut.server.cors.enabled=true
micronaut.server.cors.configurations.default.allowed-origins=http://127.0.0.1:5500
micronaut.server.cors.configurations.default.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
micronaut.server.cors.configurations.default.allowed-headers=Authorization,Content-Type
micronaut.server.cors.configurations.default.allow-credentials=true

micronaut.security.intercept-url-map[0].pattern=/swagger/**
micronaut.security.intercept-url-map[0].access[0]=isAnonymous()
micronaut.security.intercept-url-map[1].pattern=/swagger-ui/**
micronaut.security.intercept-url-map[1].access[0]=isAnonymous()
micronaut.security.intercept-url-map[2].pattern=/login
micronaut.security.intercept-url-map[2].access[0]=isAnonymous()
micronaut.security.intercept-url-map[3].pattern=/**
micronaut.security.intercept-url-map[3].access[0]=isAuthenticated()

# RabbitMQ configuration (tách từng phần để tránh lỗi parse dấu : trong URI)
rabbitmq.uri=amqp://${RABBITMQ_USER:guest}:${RABBITMQ_PASS:guest}@${RABBITMQ_HOST:localhost}:${RABBITMQ_PORT:5672}

micronaut.server.port=8084