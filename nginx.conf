events {
    worker_connections 1024;
    # Handle up to 1,024 simultaneous connections
}

http {
    include       mime.types;
    default_type  application/octet-stream; 
    # Tell Nginx recognize different file extensions (like .css, .js, .png) 
    # so it can tell the browser how to render them properly.

    server {
        listen 80;

        # 1. FRONTEND: get HTML/CSS/JS files from ecom-fe folder
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 2. BACKEND (API GATEWAY)
        location /api/products {
            proxy_pass http://catalog-service:8081;
        }
        location /api/categories {
            proxy_pass http://catalog-service:8081;
        }

        # Forward to inventory-service (Port 8082)
        location /api/inventory {
            proxy_pass http://inventory-service:8082;
        }
        location /api/group-buys/stream {
            proxy_pass http://catalog-service:8081;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }
        location /api/group-buys {
            proxy_pass http://inventory-service:8082;
        }

        # Forward group-buys stream from catalog-service (SSE)
        location /api/catalog/group-buys/stream {
            proxy_pass http://catalog-service:8081;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }
        location /api/catalog/group-buys {
            proxy_pass http://catalog-service:8081;
        }

        # Forward to user-service (Port 8083)
        location /api/users {
            proxy_pass http://user-service:8083;
        }
        location /auth/ {
            proxy_pass http://user-service:8083;
        }
        location /uploads/ {
            proxy_pass http://user-service:8083; # For user uploaded images
        }

        # Forward to cart-service (Port 8084)
        location /api/cart {
            proxy_pass http://cart-service:8084;
        }

        # Forward to order-service (Port 8085)
        location /api/orders {
            proxy_pass http://order-service:8085;
        }
    }
}
